<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>КРОК 3 Хірургія — інтерактивні тести</title>
<style>
:root {
  --blue:#0ea5ff;
  --green:#22c55e;
  --red:#ef4444;
  --text:#f8fafc;
  --muted:#cbd5e1;
  --panel:rgba(2,12,24,.78);
  --border:rgba(148,163,184,.35);
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
  background:#061220;
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
}
.header {
  position:sticky;
  top:0;
  z-index:10;
  display:flex;
  align-items:center;
  gap:18px;
  justify-content:space-between;
  padding:16px 20px;
  background:rgba(1,10,22,.84);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.brand {
  display:flex;
  align-items:center;
  gap:12px;
  font-weight:800;
  font-size:clamp(20px,3vw,34px);
}
.logo {
  color:var(--blue);
  font-size:32px;
}
.stats {
  display:flex;
  gap:18px;
  align-items:center;
  flex-wrap:wrap;
}
.stat {
  min-width:110px;
  color:var(--muted);
  font-size:14px;
}
.stat strong {
  display:block;
  color:var(--blue);
  font-size:24px;
  line-height:1.05;
}
.stat.green strong { color:var(--green); }
.actions {
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}
.autotoggle {
  display:flex;
  align-items:center;
  gap:9px;
  color:white;
  background:rgba(3,105,161,.18);
  border:1px solid var(--blue);
  border-radius:10px;
  padding:10px 13px;
  font-size:15px;
  cursor:pointer;
  user-select:none;
}
.autotoggle input {
  width:18px;
  height:18px;
  accent-color:var(--blue);
}
button {
  -webkit-tap-highlight-color:transparent;
}
.topbtn {
  color:white;
  background:rgba(3,105,161,.18);
  border:1px solid var(--blue);
  border-radius:10px;
  padding:12px 16px;
  font-size:16px;
  cursor:pointer;
}
.layout {
  display:grid;
  grid-template-columns:minmax(0,1fr) 320px;
  gap:22px;
  max-width:1500px;
  margin:32px auto;
  padding:0 24px;
}
.card, .side {
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:18px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
}
.card {
  padding:24px;
}
.badge {
  display:inline-block;
  background:rgba(14,165,255,.26);
  border:1px solid rgba(14,165,255,.35);
  border-radius:8px;
  padding:7px 12px;
  color:#dff3ff;
  margin-bottom:18px;
}
.question {
  font-size:clamp(18px,2.2vw,25px);
  line-height:1.55;
  margin:0 0 18px;
}
.option {
  width:100%;
  display:flex;
  align-items:center;
  gap:14px;
  margin:10px 0;
  padding:14px 16px;
  text-align:left;
  color:white;
  font-size:18px;
  border:1px solid rgba(148,163,184,.38);
  border-radius:12px;
  background:rgba(2,10,20,.56);
  cursor:pointer;
}
.letter {
  width:42px;
  min-width:42px;
  height:42px;
  border-radius:10px;
  display:grid;
  place-items:center;
  background:rgba(14,165,255,.18);
  border:1px solid rgba(148,163,184,.35);
  font-weight:700;
}
.option.correct {
  background:linear-gradient(90deg, rgba(34,197,94,.42), rgba(34,197,94,.12));
  border-color:var(--green);
}
.option.wrong {
  background:linear-gradient(90deg, rgba(239,68,68,.42), rgba(239,68,68,.12));
  border-color:var(--red);
}
.option.correct .letter { background:rgba(34,197,94,.85); }
.option.wrong .letter { background:rgba(239,68,68,.85); }
.feedback {
  display:none;
  margin-top:18px;
  padding:18px;
  border-radius:14px;
  border:1px solid var(--border);
  background:rgba(2,12,24,.65);
  font-size:18px;
}
.feedback.show { display:block; }
.feedback.good {
  border-color:var(--green);
  background:rgba(22,101,52,.38);
}
.feedback.bad {
  border-color:var(--red);
  background:rgba(127,29,29,.38);
}
.navbuttons {
  margin-top:22px;
  display:flex;
  justify-content:center;
  gap:14px;
}
.navbtn {
  min-width:210px;
  padding:14px 18px;
  border-radius:10px;
  border:1px solid var(--border);
  color:white;
  background:rgba(2,12,24,.58);
  font-size:17px;
  cursor:pointer;
}
.navbtn.primary {
  background:linear-gradient(90deg,#0369a1,#0284c7);
  border-color:#0ea5ff;
}
.side {
  padding:20px;
  align-self:start;
  position:sticky;
  top:105px;
}
.side h2 {
  margin:0 0 18px;
  font-size:22px;
}
.grid {
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:8px;
}
.navnum {
  height:42px;
  border-radius:8px;
  border:1px solid var(--border);
  color:white;
  background:rgba(2,10,20,.5);
  font-size:16px;
  cursor:pointer;
}
.navnum.current { background:#0284c7; border-color:#38bdf8; }
.navnum.ok { background:rgba(34,197,94,.75); }
.navnum.no { background:rgba(239,68,68,.75); }
.legend {
  margin-top:18px;
  border-top:1px solid var(--border);
  padding-top:16px;
  color:var(--muted);
  line-height:1.9;
}
.box {
  display:inline-block;
  width:16px;
  height:16px;
  border-radius:4px;
  margin-right:8px;
  vertical-align:-2px;
}
.okbox { background:var(--green); }
.nobox { background:var(--red); }
.curbox { background:#0284c7; }
.emptybox { background:rgba(148,163,184,.35); }
.footer {
  text-align:center;
  color:var(--muted);
  padding:18px;
  background:rgba(1,10,22,.55);
  border-top:1px solid var(--border);
}
@media (max-width: 900px) {
  .header { align-items:flex-start; flex-direction:column; }
  .layout { grid-template-columns:1fr; margin:18px auto; padding:0 12px; }
  .side { position:static; }
  .stats { gap:12px; }
  .stat { min-width:92px; }
  .actions { width:100%; }
  .topbtn, .autotoggle { flex:1; justify-content:center; padding:11px 8px; }
  .card { padding:16px; }
  .option { font-size:16px; padding:12px; }
  .navbuttons { flex-direction:column; }
  .navbtn { width:100%; min-width:0; }
}
</style>
</head>
<body>
<header class="header">
  <div class="brand"><span class="logo">⚕</span><span>КРОК 3 Хірургія — інтерактивні тести</span></div>
  <div class="stats">
    <div class="stat">Всього тестів:<strong id="totalTests">0</strong></div>
    <div class="stat green">Правильних:<strong id="correctCount">0</strong></div>
    <div class="stat green">Відсоток:<strong id="percent">0%</strong></div>
  </div>
  <div class="actions">
    <label class="autotoggle" title="Автоматично переходити до наступного питання через 0,5 секунди після відповіді">
      <input type="checkbox" id="autoNextToggle" checked>
      <span>Автоперехід 0,5 с</span>
    </label>
    <button class="topbtn" id="shuffleBtn">↝ Перемішати</button>
    <button class="topbtn" id="resetBtn">↻ Почати спочатку</button>
  </div>
</header>

<main class="layout">
  <section class="card">
    <div class="badge" id="badge">Питання 1 з 0</div>
    <p class="question" id="questionText"></p>
    <div id="options"></div>
    <div id="feedback" class="feedback"></div>
    <div class="navbuttons">
      <button class="navbtn" id="prevBtn">← Попереднє питання</button>
      <button class="navbtn primary" id="nextBtn">Наступне питання →</button>
    </div>
  </section>

  <aside class="side">
    <h2>🗺 Навігація</h2>
    <div class="grid" id="navGrid"></div>
    <div class="legend">
      <div><span class="box okbox"></span>Правильно</div>
      <div><span class="box nobox"></span>Неправильно</div>
      <div><span class="box emptybox"></span>Не відповідано</div>
      <div><span class="box curbox"></span>Поточне питання</div>
    </div>
  </aside>
</main>

<footer class="footer">🏆 Підготовка до КРОК — твій шлях до успішної кар’єри!</footer>

tions":["Лапароцентез та діагностичний перитонеальний лаваж","Коагулограму","УЗД органів черевної порожнини","Лапароскопію","Комп’ютерну томографію органів черевної порожнини"],"correct":0},{"q":"Хворого чоловіка доставлено в стаціонар із діагнозом: перекрут яєчка. Наявні різкі, кинджальні болі у правій половині калитки, які не купуються прийомом ненаркотичних анальгетиків. Оберіть оптимальний метод лікування цього хворого:","options":["Негайне оперативне втручання","Повторне призначення ненаркотичних анальгетиків","Очікувальна тактика","Призначення наркотичних анальгетиків","Антибіотикотерапія"],"correct":0},{"q":"Хворий чоловік 30 років скаржиться на інтенсивні 'кинжальні' болі в епігастрїї, слабкість. Захворів гостро 2 години тому. Виразкового анамнезу немає. Загальний стан середнього ступеню. Температура не підвищена. Пульс -110/хв., AT - 100/70 мм рт. ст. Живіт в акті дихання участі не приймає, напружений. 'Печінкова тупість' не визначається. Симптом Щоткіна-Блюмберга позитивний у всіх відділах. Який імовірний діагноз?","options":["Перфорація полого органа. Больовий синдром","Розповсюджений перитоніт","Загострення виразкової хвороби","Гострий панкреатит. Асцит-перитоніт","Розрив аневризми аорти. Геморагічний шок"],"correct":0},{"q":"Бригаду швидкої допомоги викликали до чоловіка 43 років, стан якого різко погіршився після прийому алкоголю. Прийом баралгіну етапу не поліпшив. Скаржиться на виражений біль у верхній частині живота, нудоту, неодноразову блювоту. Об’єктивно встановлено: болючість і напруження м’язів в епігастрії. Який діагноз найбільш імовірний?","options":["Гострий панкреатит","Гострий холецистит","Гострий гепатит","Гострий апендицит","Хронічний панкреатит"],"correct":0},{"q":"У хворого 70-ти років раптово з’явилася слабкість, запаморочення. Виникло багаторазове випорожнення прямої кишки калом з рідиною темно-вишневого кольору, згортками крові. З анамнезу: за останні 5 місяців схуд на 17 кг, останні 3 місяці - закрепи. Об’єктивно: блідий, у лівій здухвинній ділянці пальпується нерухомий болісний інфільтрат. Роздуті поперечний та низхідний відділи ободової кишки. Які інструментальні дослідження на першому етапі будуть найбільш доцільними?","options":["Ректороманоскопія, іригоскопія, фібро-колоноскопія","Сцинтиграфія печінки, фракційне дуоденальне зондування","Рентгенконтрастне дослідження шлунка, ультразвукове дослідження органів черевної порожнини","Ультразвукове дослідження органів черева, оглядова рентгенографія грудної клітки","Фіброезофагогастродуоденоскопія, екскреторна урографія"],"correct":0},{"q":"Хворий 52-х років доставлений машиною швидкої допомоги до гастроентерологічного відділення зі скаргами на сильний біль за грудиною, печію, блювання яскраво-червоною кров’ю, після чого біль та печія зменшуються, дисфагію, зниження маси тіла. При рентгеноскопії стравоходу спостерігається ”ніша” 2,5 см діаметром. Яких лікувальних заходів потрібно вжити?","options":["Оперативне втручання","Консервативне ведення хворого, призначення наркотичних анальгетиків","Проведення спазмолітичної терапії","Призначення антисекреторних препаратів","Тактика спостереження за хворим"],"correct":0},{"q":"У хворого 45-ти років п’ятнадцятирічний анамнез виразкової хвороби дванадцятипалої кишки. Протягом 7-ми днів спостерігалося багаторазове блювання вмістом шлунка, загальна слабкість. Пульс -100/хв., артеріальний тиск - 90/50 мм рт. ст., тургор шкіри знижений, пальпаторно живіт дещо болючий в епігастрії. На рентгенограмі велика кількість рідини у шлунку. Поставте діагноз:","options":["Стеноз виходу зі шлунка","Гостра кишкова непрохідність","Загострення виразкової хвороби дванадцятипалої кишки","Гостре розширення шлунка","Шлунково-кишкова кровотеча"],"correct":0},{"q":"У хворого 45-ти років спостерігаються інтенсивний біль в епігастральній ділянці, багаторазове блювання, яке не приносить полегшення, виражена загальна слабкість. Об’єктивно: загальний стан тяжкий, шкіра та видимі слизові оболонки бліді, акроціаноз. Пульс - 100/хв., артеріальний тиск - 100/60 мм рт. ст. При пальпації живота: напруження передньої черевної стінки та різкий біль в зоні Шоффара та у лівому реберно-хребетному куті. Позитивний симптом Воскресенського. Поставте діагноз:","options":["Гострий панкреатит","Гострий апендицит","Перфоративна виразка ДПК","Гострий холецистит","Розшарувальна аневризма аорти"],"correct":0},{"q":"Хворого 35-ти років прооперовано з приводу перфоративної виразки дванадцятипалої кишки. На 3-тю добу після операції з’явилися скарги на набряк, синюшність та біль в місці катетеризації периферичним катетером G 18 поверхневої вени правої верхньої кінцівки. Температура тіла у межах норми. Яке ускладнення виникло у хворого?","options":["Постін’єкційний тромбофлебіт поверхневої вени правої верхньої кінцівки","Тромбофлебіт торакоабдомінальних вен (хвороба Мондора)","Тромбофлебіт верхньої порожнистої вени","Тромбофлебіт нижньої порожнистої вени","Тромбофлебіт правої підключичної вени"],"correct":0},{"q":"Під час бою солдат отримав кульове поранення лівої половини грудної клітини. Турбує біль, задишка. Пульс - 120/хв., артеріальний тиск - 90/70 мм рт. ст., частота дихання 22/хв. Періодично спльовує кров. По середньоключичній лінії зліва, на рівні II ребра рана 1х1 см, з якої при диханні виділяється піниста кров. Встановіть діагноз:","options":["Проникаюче поранення грудної клітки","Клапанний пневмоторакс","Закрита травма органів грудної клітки","Перелом II ребра зліва","Тампонада серця"],"correct":0},{"q":"На місті дорожньо-транспортної пригоди (ДТП) з пошкодженого автомобілю витягнуто хлопчика 12-ти років з численними забоями грудної клітки та відкритим переломом гомілки. При огляді: задуха, ціаноз шкіри. Права половина грудної клітини не бере участі у диханні. При перкусії: над нею визначається високий тимпаніт, аускультативно дихання не прослуховує-ться, межі серцевої тупості зміщено вліво. Тони серця глухі, прискорені. Про який небезпечний стан це свідчить?","options":["Напружений правобічний пневмоторакс","Забій легені","Відкритий пневмоторакс","Ателектаз правої легені","Гемоторакс"],"correct":0},{"q":"В медичний пункт окремої військової частини доставлено військовослужбовця з вогнепальним пораненням в ділянці 3-4 міжребер’я правої половини грудної клітки. Стан тяжкий. Систолічний артеріальний тиск - 90 мм рт. ст. Пульс - 140/хв. Шкіра бліда. На полі бою санітарним інструктором було накладено оклюзійну пов’язку та введено протибольовий засіб. На який етап медичної евакуації необхідно евакуювати пораненого для надання вичерпної медичної допомоги?","options":["В спеціалізований військово-польовий торако-абдомінальний госпіталь","В медичну рота механізованої бригади","В медичний пункт окремої військової частини","В військово-польовий госпіталь для легкопоранених","В військово-польовий сортувальний госпіталь"],"correct":0},{"q":"Чоловік 54 роки, знайдений зимою вранці на вулиці. Відчувається сильний запах алкоголю з рота, хворий поводить себе не зовсім адекватно. Скаржиться на пекучий біль, свербіння і “розпирання” пальців ніг. При огляді: ступні набряклі, на фоні побілілої шкіри є червоно-фіолетові плями, декілька пухирів, наповнених світлою рідиною. Установіть діагноз.","options":["Відмороження ІІ ст.","Відмороження ІІІ ст.","Гострий тромбоз підколінної артерії.","Синдром позиційного здавлення ступні","Відмороження І ст."],"correct":0},{"q":"Хвора 29-ти років скаржиться на різкий біль у лівій половині грудної клітки, задишку. Відомо, що годину тому назад, підірвавшись на міні, отримав закриту травму грудної клітки. При аускультації зліва дихання різко ослаблене, вислуховуються перистальтичні шуми. При рентгенологічному дослідженні визначається наявність рівнів рідини та повітря в плевральній порожнині зліва. Який діагноз найбільш імовірний?","options":["Розрив лівого купола діафрагми, зміщення кишечника у ліву плевральну порожнину.","Лівобічна емпієма плеври. Забій лівої легені.","Лівобічний пневмоторакс. Розрив лівого купола діафрагми.","Лівобічний гемоторакс. Розрив лівого купола діафрагми","Посттравматичний перикардит. Забій лівої легені. Гематома лівої легені."],"correct":0},{"q":"Після завершення бою виявлено, що внаслідок підриву будов після обвалу бетонних конструкцій боєць 59-ти років пролежав, завалений бетонним перекриттям на ліву нижню кінцівку, 8 годин. При огляді в госпіталі виявлено: різкий набряк обох ніг, множинні переломи лівоно стегна і гомілки. Пульсація в дистальних відділах лівої нижньої кінцівки не визначається, сеча червоного кольору. Ваша тактика:","options":["Ампутація лівої кінцівки в в/3 стегна","Відновлення прохідності магістральних судин","Лампасні розтини стегна і гомілки","Металоостеосинтез стрижневими апаратами лівого стегна та гомілки","Лікування переломів методом скелетного витягання"],"correct":0},{"q":"Хворий доставлений в хірургічне відділення з місця дорожнью-транспортної пригоди із закритою травмою грудної клітини та переломом ребер справа. У хворого діагностований правосторонній пневмоторакс. Хворому терміново показано","options":["Дренування плевральної порожнини","Інтубація трахеї","Трахеостомія","Торакотомія","Штучна вентиляція легень"],"correct":0},{"q":"У хворого на 17-ий день лихоманки з’явились дьогтеподібні випорожнення. При огляді: шкірні покриви бліді, температура тіла – 37,3°С, пульс – 118/хв., АТ – 90/60 мм рт. ст. Язик обкладений коричневим нальотом, потовщений. Живіт помірно роздутий. Гепатоспленомегалія. Яке імовірне ускладнення розвинулось у хворого?","options":["Кишкова кровотеча","Перфорація кишок","Тромбоз мезентеріальних судин","Дисбіоз кишечника","Активація ендогенної флори"],"correct":0},{"q":"У приймальне відділення лікарні доставлено потерпілого після падіння з висоти 3 м. Стогне від болю в животі, ноги підтягнуті до живота. Живіт напружений, у всіх відділах позитивні симптоми подразнення очеревини. На оглядовій рентгенограмі органів черевної порожнини вільний газ під обома куполами діафрагми. Який діагноз найбільш ймовірний?","options":["Розрив порожнистого органу, п оги. Яка тактика ведення хворої?","options":["Направлення хворої до хірургічного відділення","Направлення до інфекційного відділення","Введення спазмолітиків","Призначення седативних препаратів","Направлення до гінекологічного відділення"],"correct":0},{"q":"Під час виконання бойового завдання військовослужбовець 24-х років наступив на протипіхотну міну, в результаті вибуху якої ампутовано праву гомілку на рівні її с/3. Вкажіть необхідний обсяг хірургічного втручання на пошкодженій кінцівці в умовах військового польового хірургічного госпіталю пересувної госпітальної бази:","options":["Ампутація в межах здорових тканин, фасціотомія футлярів, формування культі","Санація та тампонування рани","Санація, тампонування рани, навідні шви","Ампутація в межах здорових тканин, фасціотомія футлярів, тампонування рани","Ампутація в межах травмованого сегменту, тампонування рани"],"correct":0},{"q":"Хворий звернувся зі скаргами на часте блювання після вживання їжі, схуд на 18 кг. Нерегулярно лікувався з приводу виразкової хвороби. При рентгенологічному дослідженні встановлено, що шлунок збільшений, нижній його контур розташований на рівні гребінцевої лінії. Яке ускладнення виникло у хворого?","options":["Стеноз воротаря","Пенетрація виразки в передню черевну стінку","Перфорація виразки","Пенетрація виразки в підшлункову залозу","Кишкова непрохідність"],"correct":0},{"q":"У хворого раптово з’явився різкий біль в животі. Як наслідок розвинувся колапс із втратою свідомості. Об’єктивно визначається пульсуюче утворення в епігастрїї, над яким вислуховується систолічний шум. Який діагноз?","options":["Розрив аневризми черевного відділу аорти","Гострий апендицит","Гострий холецистит","Перитоніт","Прорив виразки"],"correct":0},{"q":"Чоловік 40-ка років під час заняття спортом отримав сильний удар в живіт. За допомогою не звертався. Самопочуття було хороше. Через 2 доби від моменту отримання травми виникла слабкість, біль в животі. AT - 90/60 мм рт. ст, пульс - 110/хв., шкірні покриви бліді. Яка тактика?","options":["Термінова госпіталізація в хірургічний стаціонар","ЕГДС","Динамічний нагляд","Введення анальгетиків","Холод на живіт"],"correct":0},{"q":"Доставлений постраждалий, чоловік 35-ти років, який отримав травму при ДТП. При рентгенологічному обстежені діагностовані закриті переломи X, ХГ, ХП ребер зліва посередньоключичній лінії. Пульс - 80/хв., задовільних властивостей. AT - 125/80 мм рт. ст. Лікувався консервативно. На четверту добу при вставанні з ліжка стан хворого раптово погіршився. Блідий. Пульс - 100/хв., слабкий. AT - 80/50 мм рт. ст. Ваш діагноз:","options":["Двохетапний розрив селезінки","Пошкодження лівої легені","Пошкодження печінки","Пошкодження кишечника","Пошкодження черевної аорти"],"correct":0},{"q":"Чоловік 37-ми років 10 днів тому отримав тупу травму лівого стегна. Одразу ж з’явилися набряк та біль. Через 7 днів біль значно посилився, температура тіла підвищилася до 38,5°С, слабкість. Не лікувався. Стан погіршився. Визвав ШМД. При огляді: температура тіла - 39°С, ЧД, - 28/хв., тахікардія - 110/хв. Місцево: набряк лівого стегна, геморагічне просочування шкіри, гіперемія, різкий біль при пальпації. Лейкоцитоз зі зсувом вліво. В сечі лейкоцити, еритроцити, білок. Який діагноз?","options":["Гематома лівого стегна, що нагноїлася","Флегмона лівого стегна","Лімфангоїт лівого стегна","Тромбофлебіт підшкірних вен лівого стегна","Бешиха лівого стегна"],"correct":0},{"q":"Пацієнт 40-ка років доставлений до приймального відділення після ножового поранення. Фізикально: ЧД - 19/хв., AT - 100/70 мм рт. ст, Ps - 100/хв. Дихання праворуч послаблене. На рентгенограмі - затемнення з горизонтальним рівнем нижче рівня лопатки. Ваша подальша тактика:","options":["Пункція та дренування торакальної порожнини","Торакоскопія","Торакоцентез","Невідкладна торакотомія","Консервативна терапія"],"correct":0},{"q":"В ході бойових дій боєць отримав вогнепальне поранення черевної стінки. На полі бою була надана домедична допомога. На етапі евакуації при знятті пов’язки було встановлено: на передній черевній стінці є вхідний отвір рани до 4 см в діаметрі, з якого на поверхню виходить близько 10 см тонкої кишки. Які заходи першої лікарської допомоги?","options":["Виправити пов’язку, петлю кишки змочити стерильною вазеліновою олією","Виконати первинну хірургічну обробку рани","Кишку вправити та накласти пов’язку","Обробити кишку розчином антисептика, вправити в черевну порожнину та накласти пов’язку","Обробити кишку розчином антисептика та виконати ПХО рани"],"correct":0},{"q":"Військовослужбовець віком 28 років госпіталізований до військового госпіталю зі скаргами на різкий біль у грудній клітці, задишку. Об'єктивно: дихання ослаблене, ЧД - 24/хв, аускультативно над правою половиною грудної клітки дихальні шуми відсутні, перкуторно тимпанічний звук, зміщення середостіння вліво, на рентгенограмі легені - лінія плеври на рівні переднього відділу II ребра, наявність повітря в плевральній порожнині. Яку невідкладну медичну допомогу треба надати у цьому разі?","options":["Дренування правої плевральної порожнини за Бюлау, ПХО рани грудної клітки","Правобічну торакотомію з ушиванням поранення легені","Правобічну пульмонектомію, ПХО рани грудної клітки","Правобічну верхню лобектомію, ПХО рани грудної клітки","Правобічну нижню лобектомію, ПХО рани грудної клітки"],"correct":0},{"q":"Чоловік віком 37 років 10 днів тому отримав тупу травму лівого стегна. Одразу ж виникли набряк та біль у ділянці травми. За 7 днів біль значно посилився, підвищилася температура тіла, з’явилися слабкість та нудота. Об’єктивно спостерігається: температура тіла – 39°C, ЧДР – 28/хв, ЧСС – 110/хв, набряк, гіперемія та різкий біль під час пальпації у ділянці лівого стегна, сукровичні виділення. У загальному аналізі крові виявлено: лейкоцитоз зі зсувом лейкоцитарної формули вліво. Який патологічний стан розвинувся у пацієнта?","options":["Нагноєння гематоми лівого стегна","Лімфангіт лівого стегна","Флегмона лівого стегна","Бешихове запалення лівого стегна","Тромбофлебіт підшкірних вен лівого стегна"],"correct":0},{"q":"Чоловіка віком 36 років, який близько 3-х годин тому отримав проникаюче ножове поранення лівої половини грудної клітки, госпіталізовано до лікарні у тяжкому стані. Об'єктивно спостерігається: ейфорія, шкірні покриви бліді, тони серця глухі, тахікардія — 130/хв, АТ — 80/70 мм рт. ст., пульс ниткоподібний. Рана грудної клітки 2 см, розташована зліва по парастернальній лінії на рівні III міжреберного проміжку. Дихання над лівою легенею ослаблене, у задньо-нижніх відділах виявлено укорочення перкуторного звуку. Яка лікувальна тактика найдоцільніша у цьому разі?","options":["Невідкладна торакотомія","Переливання крові","Пункція перикарда","Комплекс реанімаційних заходів","Плевральна пункція"],"correct":0},{"q":"Постраждалого у ДТП водія автомобіля у тяжкому стані госпіталізовано до лікарні. Скаржиться на біль у лівій половині грудної клітки та живота. Шкіра та видимі слизові оболонки бліді. Пульс — 112/хв, АТ — 80/40 мм рт. ст. Які методи ургентної сонографії необхідні в цьому разі?","options":["FAST та BLUE протоколи методом УЗД","КТ головного мозку","КТ органів грудної клітки","УЗД органів таза","УЗД органів черевної порожнини, КТ головного мозку"],"correct":0},{"q":"Військовослужбовець з наскрізним пораненням правої частини грудної клітки перебуває у тяжкому стані. Об'єктивно спостерігається: задишка, пульс — 140/хв, ниткоподібний, АТ — 70/40 мм рт. ст., частота дихання — 40/хв, носогубний трикутник ціанотичний. У жовтій зоні накладена герметична пов’язка, яка на момент огляду просякла кров’ю. Яка подальша тактика насамперед?","options":["Дренування плевральної порожнини по Бюлау","Трахеостомія","Пункція плевральної порожнини","Зняття оклюзійної пов'язки","Торакотомія"],"correct":0},{"q":"Чоловік раптово відчув слабкість та запаморочення. Спостерігається тахікардія, зниження артеріального тиску, з’явилися повторні дьогтеподібні випорожнення (мелена). У якому відділі шлунково-кишкового тракту, найімовірніше, виникла кровотеча?","options":["Шлунок і дванадцятипала кишка","Пряма кишка","Тонка кишка","Сигмовидна кишка","Клубова кишка"],"correct":0},{"q":"Чоловік віком 36 років отримав вогнепальне поранення м'яких тканин правої гомілки. Самостійно наклав тиснучу пов’язку, до медичного закладу не звертався. На 3-тю добу після поранення стан поступово погіршився, підвищилася температура тіла до 39°C, з’явилася загальна слабкість, різкий біль у рані. Об’єктивно спостерігається: стан пацієнта тяжкий, пульс – 120/хв, слабкого наповнення, ритмічний, АТ – 80/40 мм рт. ст., набряк та крепітація в ураженій ділянці під час пальпації. Яке захворювання розвинулося у чоловіка?","options":["Газова гангрена","Абсцес гомілки","Тромбоз глибоких вен нижньої кінцівки","Флегмона гомілки","Тромбофлебіт поверхневих вен нижньої кінцівки"],"correct":0},{"q":"Чоловік, який хворіє на хронічний алкоголізм, скаржиться на появу вираженого болю в епігастрії. Об'єктивно спостерігається: АТ – 125/75 мм рт. ст., пульс – 92/хв, ритмічний. В аналізі сечі: α-амілаза – 1024 ОД. Попередній діагноз: хронічний панкреатит у стадії загострення. До якого відділення треба госпіталізувати чоловіка?","options":["Хірургічного відділення","Психіатричного відділення","Наркологічного відділення","Реанімаційного відділення","Терапевтичного відділення"],"correct":0},{"q":"Військовослужбовець віком 46 років доставлено до приймального відділення із поля бою. Дві години тому отримав закриту травму грудної клітки внаслідок руйнування будівлі. Об’єктивно спостерігається: частота дихання – 30/хв, артеріальний тиск – 90/60 мм рт. ст., пульс – 110/хв. Шкіра обличчя та тулуба ціанотична. На грудній клітці зліва пальпується підшкірна емфізема, перкуторно – тимпаніт над лівою половиною грудної клітки. Визначте лікувально-діагностичну тактику.","options":["Дренування лівої плевральної порожнини у II міжребер’ї по середньоключичній лінії","Дренування лівої плевральної порожнини у V міжребер’ї по середньоключичній лінії","Перикардіоцентез","Реанімаційна торакотомія зліва","Дренування лівої плевральної порожнини у VII міжребер’ї по задній аксилярній лінії"],"correct":0},{"q":"Чоловіку віком 60 років із клінічними симптомами гемотампонади серця треба терміново провести пункцію перикарда. Визначте місце пункції.","options":["Зліва від основи мечоподібного відростка. Знизу-вгору-вправо по задній поверхні грудини","У четвертому міжребер’ї на 3 см ліворуч від грудини. Ззовні-всередину","Нижче мечоподібного відростка.","Справа від основи мечоподібного відростка. Знизу-вгору-вліво по задній поверхні грудини","Крізь грудину. Ззовні-всередину"],"correct":0},{"q":"У руїнах житлового будинку санітарним інструктором роти знайдено військовослужбовця з кульовим пораненням у праву половину грудної клітки. Об’єктивно спостерігається: у 6-му міжребер’ї по середній аксилярній лінії справа рана 2×3 см, крізь яку надходить повітря. Яку медичну допомогу повинен надати санітарний інструктор?","options":["Закрити рану повітронепроникним матеріалом і евакуювати в першу чергу","На місце поранення прикласти міхур із льодом і евакуювати на наступний етап","Накласти пов’язку, покласти пораненого на живіт і евакуювати на наступний етап","Знеболити пораненого та евакуювати на наступний етап","Установити дренажну трубку крізь канал рани та накласти тугу пов’язку"],"correct":0},{"q":"Чоловіка віком 54 роки знайдено зимою на вулиці. Він скаржиться на пекучий біль, свкрбіня і «розпирання» пальців ніг. Об’єктивно встановлено: відчувається сильний запах алкоголю, пацієнт агресивний, ступні набряклі, на фоні побілілої шкіри є червоно-фіолетові плями, декілька пухирів, наповнених світлою рідиною. Встановіть діагноз.","options":["Обмороження II ступеня","Обмороження III ступеня","Гострий тромбоз підколінної артерії","Синдром позиційного здавлення ступні","Обмороження I ступеня"],"correct":0},{"q":"У чоловіка віком 46 років, у якого в анамнезі виразкова хвороба шлунка, за годину після приймання їжі з’явився біль в епігастрії, а через декілька годин на фоні загальної слабкості виникла одноразова блювота «кавовою гущею». Пацієнт викликав екстренну (швидку) медичну допомогу. Обєктивно спостерігається: пацієнт у свідомості, гемодинамічно стабільний. Якими будуть подальші дії лікаря екстреної (швидкої) медичної допомоги?","options":["Транспортувати пацієнта до хірургічного відділення","Призначити консультацію гастроентеролога","Призначити знеболюючі та протиблювотні засоби","Призначити дезінтоксикаційну терапію","Рекомендувати планове амбулаторне обстеження"],"correct":0},{"q":"Чоловік віком 26 років звернувся до лікаря-хірурга зі скаргами на появу пульсуючого утворення до 5 см у діаметрі в правій підпаховій ділянці. З анамнезу відомо, що 4 місяці тому отримав ножове поранення в цій ділянці. Пульс на артеріях правої руки збережений, але послаблений. Який патологічний стан розвинувся у пацієнта?","options":["Несправжня посттравматична аневризма правої аксилярної артерії","Гідраденіт","Лімфаденіт","Абсцес підключичної ділянки","Кіста аксилярної ділянки"],"correct":0},{"q":"У приймальному відділенні лікарі чоловік віком 30 років скаржиться на інтенсивний «кинджальний» біль в епігастрії, тошноту та загальну слабкість. Захворів раптово 2 години тому. З анамнезу відомо, що виразкового ураження ШКТ не було. Об’єктивно спостерігається: загальний стан відносно середнього ступеня тяжкості, температура тіла – 37,0°C, пульс – 110/хв, АТ – 100/70 мм рт. ст. Живіт в акті дихання участі не бере, напружений «Печінкова тупість» не визначається. Симптом подразнення очеревини позитивний у всіх відділах. Для якого патологічного стану характерні такі симптоми?","options":["Перфорація порожнистого органа. Больовий шок","Гострий панкреатит. Асцит","Гострий апендицит. Локальний перитоніт","Розрив аневризми аорти. Геморагічний шок","Загострення виразкової хвороби шлунку"],"correct":0},{"q":"Жінка віком 76 років госпіталізована до лікарні. Скаржиться на слабкість та різкий біль у черевній порожнині, що виник раптово, здуття живота, затримку відходження газів і калу. З анамнезу відомо, що хворіє на миготливу аритмію. Об'єктивно спостерігається: живіт дещо здутий, м'який, але різко болючий під час пальпації. Перистальтика відсутня. Перкуторно виявлено у всіх віллілах тимпаніт Pér-rectum виявлено ампула порожня, на рукавиці є залишки калу малинового кольору. За результатами аналізу крові виявлено лейкоцитоз 28×10⁹/л. Який імовірний діагноз у пацієнтки?","options":["Мезентеріальний тромбоз","Інфаркт міокарда, абдомінальна форма","Гострий панкреатит","Обтураційна кишкова непрохідність","Перфоративна виразка"],"correct":0},{"q":"У військовослужбовця спостерігається вогнепальне поранення лівої половини грудної клітки. Він скаржиться на біль та задишку. Під час огляду встановлено: шкіра бліда, під час видиху через рану грудної клітки повітря виходить назовні, а під час вдиху – поступає всередину, дихання на стороні поранення ослаблене. ЧСС – 112/хв, АТ – 100/60 мм рт. ст. Яку домедичну допомогу треба надати пораненому?","options":["Накладення оклюзійної пов'язки","Термінова ПХО рани, асептична пов’язка","Дренування середостіння","Дренування плевральної порожнини по Бюлау","Швидко евакуювати пораненого до госпіталю"],"correct":0},{"q":"Чоловік віком 78 років госпіталізований до приймального відділення. Пацієнт скаржиться на переймоподібний біль та сильне здуття живота, невідходження газів відсутність випорожнень протягом 4 днів. З анамнезу відомо, у чоловіка часті закрепи що чергуються з проносами за останніх 6 місяців у нього спостерігалися втрата ваги. Об’єктивно встановлено: пульс 92/хв АТ- 140/80 мм. рт. ст. живіт здутий, пальпаційно болючий, аускультативно вислуховується «шум плескоту» в епігастрії. За даними рентгенографієї ШКТ – множинні чаші Клойбера. При спробі постановити пацієнту сифонну клізму рідина після введення її у кількості 500 мл виливається назад. Який імовірний діагноз?","options":["Обтураційна пухлина лівої половини ободової кишки, гостра непрохідність, шок","Заворот сигмоподібної кишки","Гострий дивертикуліт сигмоподібної кишки","Гострий парапроктит","Неспецифічний виразковий коліт"],"correct":0},{"q":"У чоловіка віком 42 роки первинно з’явився напружений набряк правого надпліччя і всієї правої руки з ціанозом та посиленням венозного малюнка на плечі і надпліччі. Пальпаторно відзначається болючість в аксилярній ямці та по ходу судинного пучка на плечі. Пульсація артерій збережена, але ослаблена через набряк. Для якого захворювання характерні такі симптоми?","options":["Тромбоз правої підключичної вени","Правобічний гідраденіт","Флегмона правого плеча","Тромбоемболія правої аксилярної артерії","Гнійний артрит правого плечового суглоба"],"correct":0},{"q":"Пацiєнта вiком 25 рокiв шпиталiзовано за 30 хвилин пiсля ДТП зi скаргами на бiль у животi, слабкiсть, нудоту, запаморочення. Об’єктивно спостерiгася: шкiрнi покриви блiдi, АТ не визначається, пульс — 130/хв, у лiвому пiдребiр’ї — крововилив пiд шкiру. Ознаки черепно-мозкової травми вiдсутнi. Дихання прослуховується з обох сторiн. Якi невiдкладнi дiї треба виконати насамперед?","options":["Термiнову лапаротомiю","Дiагностичну лапароскопiю","Консультацiю лiкаря-терапевта","Рентгенографiю органiв черевної порожнини","Iнфузiйну терапiю"],"correct":0},{"q":"Пацiєнта вiком 25 рокiв пiсля ДТП госпiталiзовано з дiагнозом: травма живота. Скаржиться на бiль у верхнiх вiддiлах живота з iррадiацiєю в лiве надплiччя. Об’єктивно спостерiгається: пацiєнт блiдий, артерiальний тиск — 90/50 мм рт. ст., пульс — 116/хв, притуплення перкуторного звуку у верхнiх та середнiх бiчних квадрантах живота, слабопозитивний симптом Щоткiна-Блюмберга. Який попереднiй дiагноз?","options":["Розрив селезiнки","Забiй печiнки","Розрив сечового мiхура","Розрив шлунку","Розрив кишечника"],"correct":0},{"q":"Пацiєнта вiком 69 рокiв прооперовано з приводу злоякiсного новоутворення правої легенi. У верхнiй порожнистiй венi функцiонує венозний катетер. Через 72 години пiсля операцiї у пацiєнта з’явився розпираючий головний бiль. Об’єктивно виявлено: набряк м’яких тканин шиї, голови, цiаноз верхньої половини тулуба. Яке ускладнення найбiльш iмовiрне у пацiєнта?","options":["Тромбоз верхньої порожнистої вени","Закритий пневмоторакс пiд час встановлення венозного катетера","Гострий медiастенiт унаслiдок встановлення венозного катетера","Емболiя легеневої артерiї","Пiдшкiрна емфiзема внаслiдок встановлення венозного катетера"],"correct":0},{"q":"До стабiлiзацiйного пункту госпiталiзовано вiйськового у задовiльному станi зi слiпим кульовим пораненням м’яких тканин лiвого стегна. Артерiальний тиск — 120/70 мм рт. ст., пульс — 78/хв. Асептична пов’язка помiрно просякнута кров’ю. Вкажiть, якi заходи профiлактики iнфекцiйних ускладнень потрiбно застосувати медичному персоналу?","options":["Первинну хiрургiчну обробку рани, антибiотикотерапiю","Первинну хiрургiчну обробку рани з накладанням первинного шва, антибiотикотерапiю","Знеболення, антибiотикотерапiю","Уведення фiзiологiчного розчину внутрiшньовенно, iммобiлiзацiю лiвої нижньої кiнцiвки шиною Крамера","Тампонаду рани з накладанням шкiрних швів"],"correct":0},{"q":"Пацiєнт вiком 20 рокiв звернувся до сiмейного лiкаря зi скаргами на появу пухлиноподiбного, рiзко болючого утворення в мiжсiдничнiй складцi, акт дефекацiї безболiсний, температура 38,8oС . Пiд час огляду спостерiгається: у дiлянцi куприка наявне еластичне утворення, шкiра гiперемована. Встановiть дiагноз.","options":["Кiста куприка, що нагноїлася","Геморой","Гострий пiдшкiрний парапроктит","Пухлина прямої кишки","Гострий iшiоректальний парапроктит"],"correct":0},{"q":"Чоловiк вiком 48 рокiв скаржиться на сильний постiйний бiль у животi, спрагу протягом 12 годин. Об’єктивно спостерiгається: температура — 39,5oС , ЧС С — 106 уд/хв, язик сухий, бiлий, живiт симетричний, напружений, злегка здутий. У всiх дiлянках живота пальпацiя рiзко болюча, позитивнi симптоми подразнення очеревини. У загальному аналiзi кровi виявлено лейкоцитоз — 16, 3 · 10/л. Встановiть попереднiй дiагноз.","opti ений, дошкоподiбний, рiзко болючий у всiх вiддiлах. Яке дослiдження треба виконати для пiдтвердження вiдкритої травми черева з перфорацiєю порожнинного органа?","options":["Оглядову рентгенографiю черевної порожнини","МРТ черевної порожнини","Дiагностичну лапароскопiю","Контрастну рентгенографiю шлунковокишкового тракту","Комп’ютерну томографiю черевної порожнини"],"correct":0},{"q":"Пацiєнт вiком 40 рокiв скаржиться на бiль у здухвиннiй дiлянцi праворуч. Захворiв 7 годин тому, виник бiль в епiгастрiї. За 3 години бiль локалiзувався в здухвиннiй дiлянцi праворуч. Живiт вiдстає в актi дихання, пiд час пальпацiї в здухвиннiй дiлянцi праворуч спостерiгається бiль, напруження м’язiв та позитивнi симптоми подразнення очеревини. Встановiть попереднiй дiагноз.","options":["Гострий апендицит","Гострий панкреатит","Гострий холецистит","Гострий пiєлонефрит праворуч","Гострий аднексит праворуч"],"correct":0},{"q":"Вiйськовослужбовець евакуйований з поля бою до стабiлiзацiйного пункту з закритою травмою грудної клiтки. Об’єктивно спостерiгається: шкiра цiанотична, ЧД — 30/хв, перкуторно — тимпанiт над лiвою поверхнею грудної клiтки, на груднiй стiнцi та шиї спостерiгається пiдшкiрна емфiзема, АТ — 90/60 мм рт. ст., пульс — 110/хв. Якi лiкувальнi заходи треба здiйснити насамперед?","options":["Дренування лiвої плевральної порожнини у II мiжребер’ї по середньо-ключичнiй лiнiї","Дренування лiвої плевральної порожнини у II мiжребер’ї по парастернальнiй лiнiї","Дренування лiвої плевральної порожнини у V мiжребер’ї по середнiй аксiлярнiй лiнiї","Перикардiоцентез","Реанiмацiйну торакотомiю злiва"],"correct":0},{"q":"Пацiєнтку вiком 17 рокiв вжалила комаха в дiлянку лiвого передплiччя 5 дiб тому. За двi доби в дiлянцi вжалення з’явилася iнфiльтрацiя, гiперемiя, набряк, посилився бiль. Об’єктивно спостерiгається: в середнiй третинi лiвого передплiччя в пiдшкiрнiй клiтковинi iнфiльтрат 4х4 см, з нечiткими контурами з флуктуацiєю в центрi. Шкiра над iнфiльтратом гiперемована, локальне пiд ва гемотрансфузiя","ЕКГ+ консультацiя кардiолога"],"correct":0},{"q":"Пацiєнт вiком 42 роки скаржиться на виражений бiль у правому пiдребер’ї, що швидко поширився на весь живiт. Об’єктивно спостерiгається: живiт пiд час пальпацiї рiзко болючий, iз вираженим напруженням м’язiв передньої черевної стiнки по правому фланку. Симптом Щоткiна-Блюмберга позитивний справа. За результатами рентгенографiї органiв черевної порожнини виявлено: серпоподiбне просвiтлення пiд правим куполом дiафрагми. Який найiмовiрнiший дiагноз?","options":["Перфорацiя порожнистого органа черевної порожнини","Гострий холецистит","Гострий панкреатит","Гострий апендицит","Гостра кишкова непрохiднiсть"],"correct":0},{"q":"Пацiєнтка вiком 70 рокiв скаржиться на сильний бiль та здуття живота злiва, закрепи, видiлення кровi та слизу пiд час дефекацiї. Iз анамнезу вiдомо, що хворiє понад 2 роки, схудла на 15 кг, стан прогресивно погiршується. Об’єктивно спостерiгається: у лiвiй здухвиннiй дiлянцi пальпується iнфiльтрат до 7 см дiаметром, ректально – на рукавичцi «малинове желе». Який найiмовiрнiший дiагноз?","options":["Рак сигмовидної ободової кишки","Полiп сигмовидної кишки","Хвороба Крона товстої кишки","Виразковий колiт","Дивертикульоз товстої кишки"],"correct":0},{"q":"У пацiєнта дiагностовано напружений правостороннiй пневмоторакс. Яку невiдкладну допомогу необхiдно надати першочергово?","options":["Дренування плевральної порожнини","Трахеостомiю","Штучну вентиляцiя легень","Iнтубацiю трахеї","Торакотомiю"],"correct":0},{"q":"Пацiєнтку вiком 53 роки шпиталiзовано зi скаргами на здуття живота, затримку випорожнення. Об’єктивно спостерiгається: язик сухий, обкладений коричневим нальотом, напруження передньої черевної стiнки пiд час пальпацiї живота. Пацiєнтка займає вимушене положення на правому боцi. За результатами рентгенографiї органiв черевної порожнини виявлено чашi Клойбера. Який найiмовiрнiший дiагноз?","options":["Гостра кишкова непрохiднiсть","Гострий панкреатит","Гострий холецистит","Перфоративна виразка","Защемлена пупкова кила"],"correct":0},{"q":"Пацiєнт вiком 25 рокiв скаржиться на утруднене дихання, задишку та кровохаркання. Iз анамнезу вiдомо, що отримав поранення осколком снаряда у грудну клiтку справа. Об’єктивно спостерiгається: загальний стан тяжкий, шкiра блiда. Пульс — 110/хв. На рiвнi 4 ребра по боковiй поверхнi правої половини грудної клiтки є рана розмiром 3х4 см, через яку пiд час вдиху втягується повiтря, а при видиху виходить. У чому полягає домедична допомога пораненому?","options":["Накладаннi оклюзiйної пов’язки","Ушиваннi рани","Дренуваннi грудної порожнини у II мiжребер’ї","Дренуваннi по Бюлау","Iнтубацiї трахеї"],"correct":0}]</script>
<script>
var originalQuestions = JSON.parse(document.getElementById('questionData').textContent);
var questions = [];
var current = 0;
var answers = [];
var autoNextTimer = null;

function shuffleArray(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

function prepareQuestions() {
  questions = JSON.parse(JSON.stringify(originalQuestions));
  shuffleArray(questions);
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var correctText = q.options[q.correct];
    shuffleArray(q.options);
    q.correct = q.options.indexOf(correctText);
  }
  answers = new Array(questions.length).fill(null);
  current = 0;
}

function updateStats() {
  var correct = 0;
  var answered = 0;
  for (var i = 0; i < answers.length; i++) {
    if (answers[i] !== null) {
      answered++;
      if (answers[i] === questions[i].correct) correct++;
    }
  }
  var percent = answered ? Math.round(correct / answered * 1000) / 10 : 0;
  document.getElementById('totalTests').textContent = questions.length;
  document.getElementById('correctCount').textContent = correct + ' / ' + answered;
  document.getElementById('percent').textContent = percent + '%';
}

function renderNav() {
  var grid = document.getElementById('navGrid');
  grid.innerHTML = '';
  for (var i = 0; i < questions.length; i++) {
    var b = document.createElement('button');
    b.className = 'navnum';
    if (i === current) b.className += ' current';
    if (answers[i] !== null) {
      b.className += answers[i] === questions[i].correct ? ' ok' : ' no';
    }
    b.textContent = i + 1;
    (function(index) {
      b.onclick = function() {
        clearAutoNextTimer();
        current = index;
        render();
      };
    })(i);
    grid.appendChild(b);
  }
}

function render() {
  var q = questions[current];
  document.getElementById('badge').textContent = 'Питання ' + (current + 1) + ' з ' + questions.length;
  document.getElementById('questionText').textContent = q.q;

  var opts = document.getElementById('options');
  opts.innerHTML = '';

  for (var i = 0; i < q.options.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'option';
    var letter = String.fromCharCode(65 + i);
    btn.innerHTML = '<span class="letter">' + letter + '</span><span>' + escapeHtml(q.options[i]) + '</span>';

    if (answers[current] !== null) {
      if (i === q.correct) btn.className += ' correct';
      if (i === answers[current] && i !== q.correct) btn.className += ' wrong';
    }

    (function(index) {
      btn.onclick = function() {
        if (answers[current] !== null) return;
        answers[current] = index;
        updateStats();
        render();
        scheduleAutoNext();
      };
    })(i);

    opts.appendChild(btn);
  }

  var fb = document.getElementById('feedback');
  fb.className = 'feedback';
  fb.innerHTML = '';
  if (answers[current] !== null) {
    var good = answers[current] === q.correct;
    fb.className = 'feedback show ' + (good ? 'good' : 'bad');
    fb.innerHTML = good
      ? '<b>✓ Правильно!</b><br>Правильна відповідь: ' + escapeHtml(q.options[q.correct])
      : '<b>✗ Неправильно.</b><br>Правильна відповідь: ' + escapeHtml(q.options[q.correct]);
  }

  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = current === questions.length - 1;

  updateStats();
  renderNav();
}

function clearAutoNextTimer() {
  if (autoNextTimer) {
    clearTimeout(autoNextTimer);
    autoNextTimer = null;
  }
}

function scheduleAutoNext() {
  clearAutoNextTimer();
  var toggle = document.getElementById('autoNextToggle');
  if (!toggle || !toggle.checked) return;
  if (current >= questions.length - 1) return;
  autoNextTimer = setTimeout(function() {
    current++;
    render();
  }, 500);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, function(m) {
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m];
  });
}

document.getElementById('prevBtn').onclick = function() {
  clearAutoNextTimer();
  if (current > 0) {
    current--;
    render();
  }
};

document.getElementById('nextBtn').onclick = function() {
  clearAutoNextTimer();
  if (current < questions.length - 1) {
    current++;
    render();
  }
};

document.getElementById('resetBtn').onclick = function() {
  clearAutoNextTimer();
  if (confirm('Почати тест спочатку?')) {
    answers = new Array(questions.length).fill(null);
    current = 0;
    render();
  }
};

document.getElementById('shuffleBtn').onclick = function() {
  clearAutoNextTimer();
  if (confirm('Перемішати питання і відповіді? Поточний результат буде скинуто.')) {
    prepareQuestions();
    render();
  }
};

document.getElementById('autoNextToggle').onchange = function() {
  if (!this.checked) clearAutoNextTimer();
};

prepareQuestions();
render();
</script>
</body>
</html>
